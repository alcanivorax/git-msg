name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Static analysis (typecheck + lint + format) ────────────────────────────
  # Runs in parallel with the test job. Neither depends on the other,
  # so a lint failure and a test failure are both visible in one run.
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  # ── Tests across supported Node versions ──────────────────────────────────
  # Validates the supported range declared in package.json engines (>=18).
  # Node 18 = maintenance LTS, 20 = active LTS, 22 = current LTS.
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test -- --run

  # ── Build verification ─────────────────────────────────────────────────────
  # Confirms the TypeScript compiler produces a clean dist/ and that
  # the postbuild chmod step succeeds. Runs only on the current LTS.
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify binary is executable
        run: test -x dist/index.js
